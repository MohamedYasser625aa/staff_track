name: staff_track
description: "StaffTrack - نظام حضور وانصراف الموظفين"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  
  # Cloud Functions
  cloud_functions: ^5.0.0
  
  # OpenStreetMap
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  
  # HTTP
  http: ^1.1.0
  
  # الأذونات
  permission_handler: ^11.0.0
  
  # الموقع الجغرافي
  geolocator: ^12.0.0
  
  # التنسيق
  intl: ^0.18.0
  
  # الصور
  image_picker: ^1.0.0
  firebase_storage: ^12.0.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true